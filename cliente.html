<!-- cliente.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cliente | Trans Mobilidade Bavanga</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Sidebar Menu */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            transition: left 0.3s ease;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .profile-photo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #fff, #888);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            color: #000;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .profile-photo:hover {
            transform: scale(1.05);
        }

        .sidebar-header h3 {
            margin-bottom: 5px;
        }

        .sidebar-header p {
            opacity: 0.6;
            font-size: 14px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
            color: #fff;
            text-decoration: none;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 30px;
        }

        .menu-item i {
            width: 25px;
            font-size: 18px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Top Bar */
        .top-bar {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-icon {
            font-size: 24px;
            cursor: pointer;
        }

        .logo-small {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-small .logo-icon {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #fff, #888);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .notif-icon {
            position: relative;
            cursor: pointer;
        }

        .notif-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: #ff4444;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Content */
        .main-content {
            margin-top: 70px;
            padding: 20px;
            padding-bottom: 80px;
        }

        /* Location Cards */
        .location-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .location-input {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 15px;
            border-radius: 15px;
            color: white;
            width: 100%;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .location-input:focus {
            outline: none;
            background: rgba(255,255,255,0.15);
        }

        .suggestions {
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }

        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .suggestion-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .price-display {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
            text-align: center;
        }

        .request-btn {
            width: 100%;
            padding: 18px;
            background: white;
            color: black;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .request-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255,255,255,0.3);
        }

        .request-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Map Container */
        .map-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            height: 300px;
            margin-top: 20px;
            overflow: hidden;
            position: relative;
        }

        .map-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            color: #666;
        }

        /* Histórico */
        .historico-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Notificações */
        .notificacao-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid white;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            color: black;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Avaliação Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
        }

        .stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .star {
            font-size: 40px;
            cursor: pointer;
            color: #555;
            transition: all 0.3s;
        }

        .star.active {
            color: #ffd700;
        }

        .rating-options {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .rating-option {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            cursor: pointer;
        }

        .rating-option.selected {
            background: white;
            color: black;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
            }
            
            .price-display {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="profile-photo" id="profilePhoto">
                <i class="fas fa-user"></i>
            </div>
            <h3 id="userName">Carregando...</h3>
            <p id="userPhone"></p>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="showTab('perfil')">
                <i class="fas fa-user-circle"></i> <span>Meu Perfil</span>
            </div>
            <div class="menu-item" onclick="showTab('historico')">
                <i class="fas fa-history"></i> <span>Histórico</span>
            </div>
            <div class="menu-item" onclick="showTab('configuracoes')">
                <i class="fas fa-cog"></i> <span>Configurações</span>
            </div>
            <div class="menu-item" onclick="showAjuda()">
                <i class="fas fa-question-circle"></i> <span>Ajuda</span>
            </div>
            <div class="menu-item" onclick="showNotificacoes()">
                <i class="fas fa-bell"></i> <span>Notificações</span>
                <span class="notif-badge" id="notifBadge">0</span>
            </div>
            <div class="menu-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> <span>Sair</span>
            </div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="menu-icon" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </div>
        <div class="logo-small">
            <div class="logo-icon">
                <i class="fas fa-motorcycle"></i>
            </div>
            <span>Trans Mobilidade</span>
        </div>
        <div class="notif-icon" onclick="showNotificacoes()">
            <i class="fas fa-bell"></i>
            <span class="notif-badge" id="topNotifBadge">0</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="tabs">
            <div class="tab active" data-tab="pedir">Pedir Corrida</div>
            <div class="tab" data-tab="historico">Histórico</div>
            <div class="tab" data-tab="perfil">Perfil</div>
        </div>

        <!-- Pedir Corrida Tab -->
        <div class="tab-content active" id="tab-pedir">
            <div class="location-card">
                <input type="text" class="location-input" id="origem" placeholder="📍 Ponto de partida" autocomplete="off">
                <div class="suggestions" id="origemSuggestions"></div>
                
                <input type="text" class="location-input" id="destino" placeholder="🏁 Destino" autocomplete="off">
                <div class="suggestions" id="destinoSuggestions"></div>
                
                <div class="price-display" id="priceDisplay">
                    Preço: -- Kz
                </div>
                
                <button class="request-btn" id="requestBtn" onclick="solicitarCorrida()">
                    Solicitar Moto-Táxi
                </button>
                
                <div class="map-container">
                    <div class="map-placeholder" id="mapPlaceholder">
                        <i class="fas fa-map-marked-alt" style="font-size: 48px;"></i>
                        <p>Mapa será carregado com a rota</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Histórico Tab -->
        <div class="tab-content" id="tab-historico">
            <h3>Minhas Viagens</h3>
            <div id="historicoList"></div>
        </div>

        <!-- Perfil Tab -->
        <div class="tab-content" id="tab-perfil">
            <div class="location-card">
                <h3>Dados Pessoais</h3>
                <div style="text-align: center; margin: 20px 0;">
                    <div class="profile-photo" style="width: 100px; height: 100px; font-size: 50px; margin: 0 auto;" id="perfilFoto">
                        <i class="fas fa-user"></i>
                    </div>
                    <button class="request-btn" style="margin-top: 10px; padding: 10px;" onclick="alterarFoto()">Alterar Foto</button>
                </div>
                
                <div class="input-group" style="margin-bottom: 15px;">
                    <label>Nome Completo</label>
                    <input type="text" class="location-input" id="editNome" style="margin-bottom: 0;">
                </div>
                
                <div class="input-group" style="margin-bottom: 15px;">
                    <label>Email</label>
                    <input type="email" class="location-input" id="editEmail" style="margin-bottom: 0;">
                </div>
                
                <div class="input-group" style="margin-bottom: 15px;">
                    <label>Telefone</label>
                    <input type="tel" class="location-input" id="editTelefone" style="margin-bottom: 0;">
                </div>
                
                <button class="request-btn" onclick="salvarPerfil()">Salvar Alterações</button>
                <button class="request-btn" style="background: #ff4444; color: white; margin-top: 10px;" onclick="abrirModalExcluir()">Excluir Conta</button>
            </div>
        </div>
    </div>

    <!-- Modal Avaliação -->
    <div class="modal" id="avaliacaoModal">
        <div class="modal-content">
            <h3>Avaliar Corrida</h3>
            <div class="stars" id="stars">
                <i class="fas fa-star star" data-value="1"></i>
                <i class="fas fa-star star" data-value="2"></i>
                <i class="fas fa-star star" data-value="3"></i>
                <i class="fas fa-star star" data-value="4"></i>
                <i class="fas fa-star star" data-value="5"></i>
            </div>
            <div class="rating-options" id="ratingOptions">
                <div class="rating-option" data-opcao="Boa">👍 Boa</div>
                <div class="rating-option" data-opcao="Normal">😐 Normal</div>
                <div class="rating-option" data-opcao="Ruim">👎 Ruim</div>
            </div>
            <textarea class="location-input" id="comentario" placeholder="Como foi a corrida?" rows="3"></textarea>
            <button class="request-btn" onclick="enviarAvaliacao()">Enviar Avaliação</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentCorridaId = null;
        let selectedRating = 5;
        let selectedOpcao = "Boa";
        let localizacoesAngola = [
            "Luanda - Centro", "Luanda - Maianga", "Luanda - Ingombota",
            "Luanda - Rangel", "Luanda - Samba", "Luanda - Kilamba Kiaxi",
            "Luanda - Viana", "Luanda - Talatona", "Luanda - Belas",
            "Icolo e Bengo - Catete", "Icolo e Bengo - Cabiri", "Icolo e Bengo - Bom Jesus",
            "Icolo e Bengo - Cassoneca", "Icolo e Bengo - Barragem",
            "Kilamba", "Zango", "Golf II", "Benfica", "Cazenga"
        ];

        // Inicialização
        function init() {
            checkAuth();
            loadUserData();
            loadHistorico();
            loadNotificacoes();
            setupEventListeners();
            setupAutocomplete();
        }

        function checkAuth() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = JSON.parse(user);
            if (currentUser.tipo !== 'cliente') {
                if (currentUser.tipo === 'mototaxista') window.location.href = 'mototaxista.html';
                else if (currentUser.tipo === 'gerente') window.location.href = 'gerente.html';
            }
        }

        function loadUserData() {
            document.getElementById('userName').textContent = currentUser.nome;
            document.getElementById('userPhone').textContent = currentUser.telefone;
            document.getElementById('editNome').value = currentUser.nome;
            document.getElementById('editEmail').value = currentUser.email || '';
            document.getElementById('editTelefone').value = currentUser.telefone;
        }

        function loadHistorico() {
            const corridas = JSON.parse(localStorage.getItem('corridas')) || [];
            const minhasCorridas = corridas.filter(c => c.clienteId === currentUser.id && c.status === 'concluida');
            
            const container = document.getElementById('historicoList');
            if (minhasCorridas.length === 0) {
                container.innerHTML = '<p style="text-align: center; opacity: 0.5;">Nenhuma viagem encontrada</p>';
                return;
            }
            
            container.innerHTML = minhasCorridas.map(corrida => `
                <div class="historico-item">
                    <div>
                        <strong>${corrida.origem}</strong> → <strong>${corrida.destino}</strong><br>
                        <small>${new Date(corrida.data).toLocaleString()}</small><br>
                        <small>Valor: ${corrida.preco} Kz | Motorista: ${corrida.mototaxistaNome || 'Pendente'}</small>
                    </div>
                    <div>
                        ${corrida.avaliado ? '<i class="fas fa-star" style="color: #ffd700;"></i>' : 
                          '<button class="request-btn" style="padding: 8px 16px; font-size: 12px;" onclick="avaliarCorrida(\'' + corrida.id + '\')">Avaliar</button>'}
                    </div>
                </div>
            `).join('');
        }

        function loadNotificacoes() {
            const notificacoes = JSON.parse(localStorage.getItem('notificacoes')) || [];
            const minhasNotificacoes = notificacoes.filter(n => n.usuarioId === currentUser.id && !n.lida);
            const count = minhasNotificacoes.length;
            document.getElementById('notifBadge').textContent = count;
            document.getElementById('topNotifBadge').textContent = count;
        }

        function showNotificacoes() {
            const notificacoes = JSON.parse(localStorage.getItem('notificacoes')) || [];
            const minhasNotificacoes = notificacoes.filter(n => n.usuarioId === currentUser.id);
            
            // Marcar como lidas
            minhasNotificacoes.forEach(n => n.lida = true);
            localStorage.setItem('notificacoes', JSON.stringify(notificacoes));
            loadNotificacoes();
            
            if (minhasNotificacoes.length === 0) {
                alert("Nenhuma notificação");
            } else {
                let msg = "📢 NOTIFICAÇÕES:\n\n";
                minhasNotificacoes.forEach(n => {
                    msg += `📌 ${n.titulo}\n   ${n.mensagem}\n   ${new Date(n.data).toLocaleString()}\n\n`;
                });
                alert(msg);
            }
        }

        function setupAutocomplete() {
            const origemInput = document.getElementById('origem');
            const destinoInput = document.getElementById('destino');
            
            origemInput.addEventListener('input', () => showSuggestions('origem'));
            destinoInput.addEventListener('input', () => showSuggestions('destino'));
        }

        function showSuggestions(field) {
            const input = document.getElementById(field);
            const suggestionsDiv = document.getElementById(`${field}Sugestions`);
            const value = input.value.toLowerCase();
            
            if (value.length < 2) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            const filtered = localizacoesAngola.filter(loc => loc.toLowerCase().includes(value));
            
            if (filtered.length === 0) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            suggestionsDiv.innerHTML = filtered.map(loc => `
                <div class="suggestion-item" onclick="selectLocation('${field}', '${loc}')">${loc}</div>
            `).join('');
            suggestionsDiv.style.display = 'block';
        }

        function selectLocation(field, value) {
            document.getElementById(field).value = value;
            document.getElementById(`${field}Sugestions`).style.display = 'none';
            calcularPreco();
        }

        function calcularPreco() {
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;
            
            if (origem && destino) {
                // Simular cálculo de preço baseado na distância
                const precoBase = 500;
                const distancia = Math.random() * 15 + 2;
                const preco = Math.floor(precoBase + (distancia * 150));
                document.getElementById('priceDisplay').innerHTML = `💰 Preço: ${preco} Kz`;
                return preco;
            }
            document.getElementById('priceDisplay').innerHTML = 'Preço: -- Kz';
            return 0;
        }

        function solicitarCorrida() {
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;
            const preco = calcularPreco();
            
            if (!origem || !destino) {
                alert("Por favor, preencha origem e destino");
                return;
            }
            
            const corrida = {
                id: Date.now().toString(),
                clienteId: currentUser.id,
                clienteNome: currentUser.nome,
                origem: origem,
                destino: destino,
                preco: preco,
                status: 'pendente',
                data: new Date().toISOString(),
                mototaxistaId: null,
                mototaxistaNome: null,
                avaliado: false
            };
            
            const corridas = JSON.parse(localStorage.getItem('corridas')) || [];
            corridas.push(corrida);
            localStorage.setItem('corridas', JSON.stringify(corridas));
            
            // Notificar gerente (simulado)
            const notificacao = {
                id: Date.now().toString(),
                usuarioId: 'admin',
                titulo: 'Nova Corrida Pendente',
                mensagem: `${currentUser.nome} solicitou corrida de ${origem} para ${destino}`,
                data: new Date().toISOString(),
                lida: false
            };
            const notificacoes = JSON.parse(localStorage.getItem('notificacoes')) || [];
            notificacoes.push(notificacao);
            localStorage.setItem('notificacoes', JSON.stringify(notificacoes));
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                alert("✅ Corrida solicitada! Aguardando atribuição de um mototaxista.");
                document.getElementById('origem').value = '';
                document.getElementById('destino').value = '';
                document.getElementById('priceDisplay').innerHTML = 'Preço: -- Kz';
                loadHistorico();
            }, 1500);
        }

        function avaliarCorrida(corridaId) {
            currentCorridaId = corridaId;
            document.getElementById('avaliacaoModal').style.display = 'flex';
        }

        function enviarAvaliacao() {
            const comentario = document.getElementById('comentario').value;
            
            const avaliacao = {
                id: Date.now().toString(),
                corridaId: currentCorridaId,
                clienteId: currentUser.id,
                nota: selectedRating,
                opcao: selectedOpcao,
                comentario: comentario,
                data: new Date().toISOString()
            };
            
            const avaliacoes = JSON.parse(localStorage.getItem('avaliacoes')) || [];
            avaliacoes.push(avaliacao);
            localStorage.setItem('avaliacoes', JSON.stringify(avaliacoes));
            
            // Marcar corrida como avaliada
            const corridas = JSON.parse(localStorage.getItem('corridas')) || [];
            const corridaIndex = corridas.findIndex(c => c.id === currentCorridaId);
            if (corridaIndex !== -1) {
                corridas[corridaIndex].avaliado = true;
                localStorage.setItem('corridas', JSON.stringify(corridas));
            }
            
            document.getElementById('avaliacaoModal').style.display = 'none';
            document.getElementById('comentario').value = '';
            alert("Obrigado pela sua avaliação!");
            loadHistorico();
        }

        function salvarPerfil() {
            const nome = document.getElementById('editNome').value;
            const email = document.getElementById('editEmail').value;
            const telefone = document.getElementById('editTelefone').value;
            
            const users = JSON.parse(localStorage.getItem('users'));
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            
            if (userIndex !== -1) {
                users[userIndex].nome = nome;
                users[userIndex].email = email;
                users[userIndex].telefone = telefone;
                localStorage.setItem('users', JSON.stringify(users));
                
                currentUser = users[userIndex];
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                alert("Perfil atualizado com sucesso!");
                loadUserData();
            }
        }

        function alterarFoto() {
            const url = prompt("Cole o URL da nova foto de perfil:");
            if (url) {
                const users = JSON.parse(localStorage.getItem('users'));
                const userIndex = users.findIndex(u => u.id === currentUser.id);
                if (userIndex !== -1) {
                    users[userIndex].foto = url;
                    localStorage.setItem('users', JSON.stringify(users));
                    currentUser = users[userIndex];
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    alert("Foto atualizada!");
                }
            }
        }

        function abrirModalExcluir() {
            if (confirm("⚠️ TEM CERTEZA QUE DESEJA EXCLUIR SUA CONTA?\nEsta ação é irreversível!")) {
                const users = JSON.parse(localStorage.getItem('users'));
                const newUsers = users.filter(u => u.id !== currentUser.id);
                localStorage.setItem('users', JSON.stringify(newUsers));
                localStorage.removeItem('currentUser');
                alert("Conta excluída com sucesso!");
                window.location.href = 'index.html';
            }
        }

        function setupEventListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;
                    showTab(tabName);
                });
            });
            
            // Stars for rating
            document.querySelectorAll('.star').forEach(star => {
                star.addEventListener('click', () => {
                    selectedRating = parseInt(star.dataset.value);
                    document.querySelectorAll('.star').forEach(s => {
                        if (parseInt(s.dataset.value) <= selectedRating) {
                            s.classList.add('active');
                        } else {
                            s.classList.remove('active');
                        }
                    });
                });
            });
            
            document.querySelectorAll('.rating-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    selectedOpcao = opt.dataset.opcao;
                    document.querySelectorAll('.rating-option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                });
            });
            
            // Ativar primeira opção
            document.querySelector('.rating-option').classList.add('selected');
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            if (tabName === 'pedir') {
                document.querySelector('.tab[data-tab="pedir"]').classList.add('active');
                document.getElementById('tab-pedir').classList.add('active');
            } else if (tabName === 'historico') {
                document.querySelector('.tab[data-tab="historico"]').classList.add('active');
                document.getElementById('tab-historico').classList.add('active');
                loadHistorico();
            } else if (tabName === 'perfil') {
                document.querySelector('.tab[data-tab="perfil"]').classList.add('active');
                document.getElementById('tab-perfil').classList.add('active');
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // Event listener para calcular preço
        document.getElementById('origem').addEventListener('change', calcularPreco);
        document.getElementById('destino').addEventListener('change', calcularPreco);

        init();
    </script>
