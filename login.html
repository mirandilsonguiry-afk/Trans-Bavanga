<!-- login.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login | Trans Mobilidade Bavanga</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeInUp 0.6s ease;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ffffff, #888888);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin: 0 auto 15px;
            box-shadow: 0 4px 20px rgba(255,255,255,0.2);
        }

        .logo h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo p {
            opacity: 0.6;
            font-size: 12px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: white;
            background: rgba(255,255,255,0.15);
        }

        .input-wrapper input.error {
            border-color: #ff4444;
            animation: shake 0.3s ease;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: white;
            color: black;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255,255,255,0.3);
            background: #e8e8e8;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            opacity: 0.7;
        }

        .register-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: white;
            text-decoration: none;
            opacity: 0.6;
            font-size: 14px;
        }

        .back-home a:hover {
            opacity: 1;
        }

        .alert {
            padding: 12px 20px;
            border-radius: 30px;
            margin-bottom: 20px;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .alert-error {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
        }

        .alert-success {
            background: rgba(68,255,68,0.2);
            border: 1px solid #44ff44;
            color: #88ff88;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-motorcycle"></i>
            </div>
            <h1>Trans Mobilidade</h1>
            <p>BAVANGA.L</p>
        </div>
        
        <h2>Bem-vindo de volta</h2>
        
        <div id="alert" class="alert"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Número de Telefone</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="telefone" placeholder="941189839" required>
                </div>
            </div>
            
            <div class="input-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>
        
        <div class="register-link">
            Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
        </div>
        
        <div class="back-home">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar para Home</a>
        </div>
    </div>

    <script>
        // Inicializar localStorage com dados padrão
        function initializeData() {
            // Verificar se já existem usuários
            if (!localStorage.getItem('users')) {
                const users = [
                    {
                        id: '1',
                        nome: 'Admin Bavanga',
                        telefone: '941189839',
                        senha: '@bavanga1234',
                        tipo: 'gerente',
                        email: 'admin@bavanga.ao',
                        foto: '',
                        dataCadastro: new Date().toISOString()
                    }
                ];
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            if (!localStorage.getItem('corridas')) {
                localStorage.setItem('corridas', JSON.stringify([]));
            }
            
            if (!localStorage.getItem('notificacoes')) {
                localStorage.setItem('notificacoes', JSON.stringify([]));
            }
            
            if (!localStorage.getItem('avaliacoes')) {
                localStorage.setItem('avaliacoes', JSON.stringify([]));
            }
        }
        
        initializeData();
        
        const loginForm = document.getElementById('loginForm');
        const alertDiv = document.getElementById('alert');
        
        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const telefone = document.getElementById('telefone').value.trim();
            const senha = document.getElementById('senha').value;
            
            if (!telefone || !senha) {
                showAlert('Por favor, preencha todos os campos', 'error');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users'));
            const user = users.find(u => u.telefone === telefone && u.senha === senha);
            
            if (user) {
                // Salvar sessão
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                showAlert('Login realizado com sucesso!', 'success');
                
                // Redirecionar baseado no tipo
                setTimeout(() => {
                    if (user.tipo === 'cliente') {
                        window.location.href = 'cliente.html';
                    } else if (user.tipo === 'mototaxista') {
                        window.location.href = 'mototaxista.html';
                    } else if (user.tipo === 'gerente') {
                        window.location.href = 'gerente.html';
                    }
                }, 1000);
            } else {
                showAlert('Número ou senha incorretos', 'error');
                
                // Adicionar classe de erro aos inputs
                document.getElementById('telefone').classList.add('error');
                document.getElementById('senha').classList.add('error');
                
                setTimeout(() => {
                    document.getElementById('telefone').classList.remove('error');
                    document.getElementById('senha').classList.remove('error');
                }, 300);
            }
        });
    </script>
</body>
</html>
